<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <rect width="160" height="160" fill="#000000"/>

  <!-- Geometric mark: ascending envelope/focus lens for paply -->
  <g transform="translate(80, 80)">
    <!-- Base diamond outline (closed envelope) -->
    <path
      d="M 0,-32 L 24,-10 L 0,32 L -24,-10 Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="2.2"
      stroke-linejoin="round"
    />

    <!-- Inner ascending arrow (upward momentum, clarity) -->
    <line x1="0" y1="8" x2="0" y2="-14" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polyline points="-4,-10 0,-16 4,-10" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Subtle lens/focus accent (brightness at intersection) -->
    <circle cx="0" cy="2" r="3.5" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
