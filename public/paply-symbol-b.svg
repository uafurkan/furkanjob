<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FB8FF"/>
      <stop offset="42%" stop-color="#4A86F0"/>
      <stop offset="100%" stop-color="#11366E"/>
    </linearGradient>
    <linearGradient id="specB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="38%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="sqB">
      <rect x="60" y="60" width="960" height="960" rx="248" ry="248"/>
    </clipPath>
  </defs>

  <!-- Squircle background -->
  <rect x="60" y="60" width="960" height="960" rx="248" ry="248" fill="url(#bgB)"/>
  <rect x="60" y="60" width="960" height="960" rx="248" ry="248" fill="url(#specB)" clip-path="url(#sqB)"/>
  <rect x="64" y="64" width="952" height="952" rx="244" ry="244" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Focus / ascend mark: two chevrons rising into a focal spark -->
  <g fill="none" stroke="#ffffff" stroke-width="66" stroke-linecap="round" stroke-linejoin="round">
    <!-- lower chevron (wide, the raw input) -->
    <polyline points="392,672 540,556 688,672" stroke-opacity="0.55"/>
    <!-- upper chevron (focused) -->
    <polyline points="440,536 540,452 640,536"/>
  </g>
  <!-- focal point (the sent application) -->
  <circle cx="540" cy="372" r="44" fill="#ffffff"/>
</svg>
