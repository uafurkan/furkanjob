<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft light-blue gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7FB5FF"/>
      <stop offset="100%" stop-color="#5A93F0"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#9FC8FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#9FC8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>

  <!-- Wordmark: lowercase, rounded geometric sans (Poppins / Nunito style fallback) -->
  <text x="540" y="540"
        font-family="'Poppins', 'Nunito', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="320"
        font-weight="600"
        letter-spacing="-12"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="central">paply</text>
</svg>
