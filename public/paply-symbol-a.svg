<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FB8FF"/>
      <stop offset="42%" stop-color="#4A86F0"/>
      <stop offset="100%" stop-color="#11366E"/>
    </linearGradient>
    <linearGradient id="specA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="38%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="sqA">
      <rect x="60" y="60" width="960" height="960" rx="248" ry="248"/>
    </clipPath>
  </defs>

  <!-- Squircle background -->
  <rect x="60" y="60" width="960" height="960" rx="248" ry="248" fill="url(#bgA)"/>
  <!-- Top specular sheen (liquid-glass light catch) -->
  <rect x="60" y="60" width="960" height="960" rx="248" ry="248" fill="url(#specA)" clip-path="url(#sqA)"/>
  <!-- Subtle inner edge light -->
  <rect x="64" y="64" width="952" height="952" rx="244" ry="244" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Monogram "p" — geometric, white -->
  <g fill="#ffffff">
    <!-- stem -->
    <rect x="392" y="360" width="104" height="462" rx="52"/>
    <!-- bowl (donut) -->
    <path fill-rule="evenodd" d="
      M 562 318
      A 182 182 0 1 0 562 682
      A 182 182 0 1 0 562 318 Z
      M 562 408
      A 92 92 0 1 1 562 592
      A 92 92 0 1 1 562 408 Z"/>
  </g>
</svg>
