<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#000000"/>

  <!-- Subtle radial gradient for depth (Veor aesthetic) -->
  <defs>
    <radialGradient id="paply-grad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#paply-grad)"/>

  <!-- Paply mark (enlarged) -->
  <g transform="translate(540, 480)">
    <!-- Base diamond outline -->
    <path
      d="M 0,-180 L 135,-55 L 0,180 L -135,-55 Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="12"
      stroke-linejoin="round"
    />

    <!-- Inner ascending arrow -->
    <line x1="0" y1="45" x2="0" y2="-80" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polyline points="-22,-55 0,-90 22,-55" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Focus accent -->
    <circle cx="0" cy="10" r="20" fill="#ffffff" opacity="0.80"/>
  </g>

  <!-- paply text below mark -->
  <text
    x="540"
    y="850"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="120"
    font-weight="700"
    letter-spacing="-2"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
  >paply</text>

  <!-- Tagline -->
  <text
    x="540"
    y="950"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="36"
    font-weight="300"
    letter-spacing="2"
    fill="#ffffff"
    opacity="0.6"
    text-anchor="middle"
    dominant-baseline="middle"
  >SMART APPLICATIONS</text>
</svg>
