<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- Black field (Veor grid) -->
  <rect width="1080" height="1080" fill="#000000"/>

  <!-- White roundel: a global "token / coin" — reads as a globe, works at any size -->
  <circle cx="540" cy="540" r="372" fill="#ffffff"/>

  <!-- Negative-space "p" carved into the coin -->
  <g fill="#000000">
    <!-- stem -->
    <rect x="430" y="400" width="82" height="360" rx="41"/>
    <!-- bowl -->
    <circle cx="592" cy="472" r="150"/>
  </g>
  <!-- counter (re-opens to white) -->
  <circle cx="592" cy="472" r="68" fill="#ffffff"/>
</svg>
