<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#000000"/>

  <!-- Paply mark centered for profile picture -->
  <g transform="translate(540, 540)">
    <!-- Base diamond outline -->
    <path
      d="M 0,-200 L 150,-60 L 0,200 L -150,-60 Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="14"
      stroke-linejoin="round"
    />

    <!-- Inner ascending arrow -->
    <line x1="0" y1="50" x2="0" y2="-90" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polyline points="-25,-60 0,-100 25,-60" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Focus accent -->
    <circle cx="0" cy="12" r="24" fill="#ffffff" opacity="0.82"/>
  </g>
</svg>
