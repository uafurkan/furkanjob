<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>İş Başvuru Asistanı</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#0b0d10; color:#e7eaee; margin:0; padding:24px; }
  .wrap { max-width: 860px; margin:0 auto; }
  h1 { font-size:20px; margin:0 0 4px; }
  p.sub { color:#9aa3ad; margin:0 0 20px; font-size:13px; }
  textarea, input { width:100%; background:#14171c; color:#e7eaee; border:1px solid #262b33; border-radius:10px; padding:12px; font-size:14px; }
  textarea { min-height:180px; resize:vertical; font-family:inherit; }
  label { display:block; font-size:12px; color:#9aa3ad; margin:14px 0 6px; }
  button { background:#3b82f6; color:#fff; border:0; border-radius:10px; padding:11px 18px; font-size:14px; cursor:pointer; font-weight:600; }
  button.secondary { background:#262b33; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .card { background:#14171c; border:1px solid #262b33; border-radius:14px; padding:18px; margin-top:18px; }
  .chip { display:inline-block; background:#1d2530; border:1px solid #2a3441; color:#bcd; border-radius:999px; padding:3px 10px; font-size:12px; margin:2px 4px 2px 0; }
  .muted { color:#9aa3ad; font-size:12px; }
  .ok { color:#4ade80; } .err { color:#f87171; } .warn { color:#fbbf24; }
  #status { margin-top:14px; font-size:14px; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>İş Başvuru Asistanı</h1>
  <p class="sub">İşletme web sitesinin içeriğini yapıştır → mail bulunur (yoksa web'de aranır), ülke/pozisyon algılanır, sponsorship'li başvuru taslağı üretilir, onayınca CV ile <b>furkanhulakojob@gmail.com</b>'dan gönderilir.</p>

  <label>İşletme içeriği (otel / restoran / kariyer sayfası metnini yapıştır)</label>
  <textarea id="content" placeholder="Web sitesinden kopyaladığın metni buraya yapıştır..."></textarea>
  <div class="row" style="margin-top:12px;">
    <button id="analyze">Analiz et &amp; taslak üret</button>
    <span id="aStatus" class="muted"></span>
  </div>

  <div id="result" class="card hidden">
    <div id="meta"></div>

    <label>Alıcı e-posta(lar) — virgülle ayır</label>
    <input id="to" type="text" />

    <label>Konu (Subject)</label>
    <input id="subject" type="text" />

    <label>E-posta metni</label>
    <textarea id="body" style="min-height:240px;"></textarea>

    <div class="row" style="margin-top:16px;">
      <button id="send">CV ile gönder</button>
      <span id="cvInfo" class="muted"></span>
    </div>
    <div id="status"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

$("analyze").onclick = async () => {
  const text = $("content").value.trim();
  if (!text) { $("aStatus").textContent = "Önce içerik yapıştır."; return; }
  $("analyze").disabled = true;
  $("aStatus").textContent = "Analiz ediliyor, gerekiyorsa web'de mail aranıyor...";
  try {
    const r = await fetch("/api/analyze", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ text }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "Hata");

    const srcLabel = { text:"metinden bulundu", "page-scrape":"site taranarak bulundu", "web-search":"web aramasıyla bulundu", none:"BULUNAMADI" }[d.emailSource] || d.emailSource;
    const draftLabel = d.draftSource === "ai" ? "Claude AI" : "akıllı şablon";

    $("meta").innerHTML =
      `<span class="chip">Şirket: ${esc(d.company)}</span>` +
      `<span class="chip">Ülke: ${esc(d.country)}</span>` +
      d.positions.map(p=>`<span class="chip">${esc(p)}</span>`).join("") +
      `<div class="muted" style="margin-top:8px;">Mail kaynağı: <b class="${d.emailSource==='none'?'warn':'ok'}">${srcLabel}</b> · Taslak: ${draftLabel} · Gönderen: ${esc(d.from)}</div>`;

    $("to").value = (d.emails || []).join(", ");
    $("subject").value = d.subject;
    $("body").value = d.body;
    $("cvInfo").innerHTML = d.cvExists ? `Ek: <span class="ok">${esc(d.cvName)}</span>` : `<span class="err">CV bulunamadı (cv/cv.pdf ekle)</span>`;
    $("result").classList.remove("hidden");
    $("status").textContent = "";
    if (d.emailSource === "none") { $("status").innerHTML = '<span class="warn">Mail otomatik bulunamadı — alıcıyı elle gir.</span>'; }
  } catch (e) {
    $("aStatus").textContent = "";
    alert("Hata: " + e.message);
  } finally {
    $("analyze").disabled = false;
    $("aStatus").textContent = "";
  }
};

$("send").onclick = async () => {
  const to = $("to").value.trim();
  if (!to) { $("status").innerHTML = '<span class="err">Alıcı e-posta gir.</span>'; return; }
  if (!confirm("Şu adrese gönderilecek:\n" + to + "\n\nDevam?")) return;
  $("send").disabled = true;
  $("status").textContent = "Gönderiliyor...";
  try {
    const r = await fetch("/api/send", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ to, subject: $("subject").value, body: $("body").value }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "Hata");
    $("status").innerHTML = `<span class="ok">✓ Gönderildi → ${esc(d.sentTo.join(", "))}${d.cvAttached?" (CV ekli)":" (CV eklenemedi)"}</span>`;
  } catch (e) {
    $("status").innerHTML = '<span class="err">Gönderilemedi: ' + esc(e.message) + '</span>';
  } finally {
    $("send").disabled = false;
  }
};

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
</script>
</body>
</html>
