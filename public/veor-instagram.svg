<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- Black background -->
  <rect width="1080" height="1080" fill="#000000"/>

  <!-- Subtle gradient overlay for depth -->
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#grad)"/>

  <!-- Geometric mark: overlapping diamonds (lens concept) -->
  <g transform="translate(270, 450)">
    <!-- Left diamond -->
    <polygon points="0,-80 70,0 0,80 -70,0" fill="none" stroke="#ffffff" stroke-width="6"/>
    <!-- Right diamond, offset -->
    <polygon points="60,-80 130,0 60,80 -10,0" fill="none" stroke="#ffffff" stroke-width="6"/>
    <!-- Shared center intersection (bright) -->
    <polygon points="60,-45 90,0 60,45 30,0" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- VEOR wordmark — modern, geometric, tight spacing -->
  <text
    x="540"
    y="700"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="220"
    font-weight="700"
    letter-spacing="-8"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
  >VEOR</text>

  <!-- Subtle accent line below (optional, minimal) -->
  <line x1="300" y1="800" x2="780" y2="800" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
</svg>
