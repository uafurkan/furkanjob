<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- Black field (Veor grid) -->
  <rect width="1080" height="1080" fill="#000000"/>

  <g fill="#ffffff">
    <!-- stem -->
    <rect x="398" y="356" width="100" height="468" rx="50"/>
    <!-- bowl as a globe (thick ring) -->
    <path fill-rule="evenodd" d="
      M 560 322
      A 178 178 0 1 0 560 678
      A 178 178 0 1 0 560 322 Z
      M 560 402
      A 98 98 0 1 1 560 598
      A 98 98 0 1 1 560 402 Z"/>
  </g>

  <!-- meridian + equator inside the bowl: the 'global' read -->
  <g fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round">
    <line x1="468" y1="500" x2="652" y2="500"/>
    <ellipse cx="560" cy="500" rx="46" ry="90"/>
  </g>
</svg>
